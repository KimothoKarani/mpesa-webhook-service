services:
  postgres:
    image: postgres:16
    container_name: mpesa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mpesa_ledger
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: mpesa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data: